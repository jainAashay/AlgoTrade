services:
  # Type of service
  type: worker
  
  # Name of your service (optional)
  name: algo-trading-bot
  
  # Runtime environment
  runtime: docker
  
  # Docker configuration
  dockerfilePath: ./Dockerfile
  dockerContext: .
  
  # Environment variables (secrets should be set in Render dashboard)
  envVars:
    - key: PYTHONUNBUFFERED
      value: "1"
    - key: PYTHONDONTWRITEBYTECODE
      value: "1"
    - key: DELTA_API_KEY
      sync: false
    - key: DELTA_API_SECRET
      sync: false
  
  # Health check configuration
  healthCheck:
    path: /
    port: 8000
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
  
  # Auto-deploy configuration
  autoDeploy: true
  
  # Build configuration
  buildCommand: ""
  startCommand: "python main.py"
  
  # Resource limits (adjust based on your needs)
  plan: starter
  
  # Region (choose closest to your exchange)
  region: oregon
  
  # Scaling
  instances: 1
  
  # Addons if needed
  # addons:
  #   - type: redis
  #     plan: free
