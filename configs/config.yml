exchange:
  name: delta
  env: testnet
  rest_url: https://api.india.delta.exchange
  ws_url: wss://socket.india.delta.exchange
  api_key: ${DELTA_API_KEY}
  api_secret: ${DELTA_API_SECRET}

instruments:
  - symbol: RIVERUSD
    quantity: 1
    resolution: 3m
    bootstrap_length: 300
    leverage: 10
    take_profit_pct: 0.04  # 0.25%
    stop_loss_pct: 0.02  # 1.2%
    strategy:
      name: simple_sma_strategy
      class: SimpleSMAStrategy
      min_move_percent: 0.2
      indicators:
        - name: ema
          length: 5
        - name: ema
          length: 13
    risk:
      max_trades: 50
      time_frame: 24h
      fill_interval: 3m

execution:
  order_type: market

logging:
  level: DEBUG
  # Directory inside the container where logs are stored.
  # You can volume‑mount this directory from the host, e.g.:
  #   -v /path/on/host/algo-logs:/app/logs
  dir: logs
  # Log file name inside the directory
  filename: app.log
  # Maximum size of each log file before rotation (in bytes)
  max_bytes: 52428800  # 5 MB
  # Number of rotated log files to keep
  backup_count: 5
